# telegraf.conf – CDM Provider Stack
#
# Collects health metrics from provider-stack services and infrastructure.
# Writes all data to TimescaleDB (PostgreSQL 17) on the provider stack.
#
# hawkBit and ThingsBoard are NOT part of the provider-stack; they live in the
# tenant-stack.  This config focuses on platform service health so the
# operations team has visibility into Keycloak, RabbitMQ, step-ca, Grafana and
# the IoT Bridge API.
#
# Environment variables (set in docker-compose.yml):
#   TSDB_HOST            – TimescaleDB hostname  (timescaledb)
#   TSDB_PORT            – PostgreSQL port  (5432)
#   TSDB_DATABASE        – Database name  (cdm)
#   TSDB_TELEGRAF_PASSWORD – Write user password for the telegraf DB user

[global_tags]
  component = "provider"

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "10s"
  flush_interval = "30s"
  flush_jitter = "10s"
  precision = ""
  quiet = false
  omit_hostname = true
  # Explicitly preserve current behavior (processors run after aggregators).
  # Remove once upgraded to Telegraf ≥1.40 and new default is acceptable.
  skip_processors_after_aggregators = false

# ── Outputs ───────────────────────────────────────────────────────────────────

[[outputs.postgresql]]
  connection = "postgresql://telegraf:$TSDB_TELEGRAF_PASSWORD@$TSDB_HOST:$TSDB_PORT/$TSDB_DATABASE?sslmode=disable"
  schema = "public"
  tags_as_foreign_keys = false

# ── Provider service health checks ───────────────────────────────────────────
# Polls HTTP health/status endpoints for all provider-stack services.
# Stored as `http_response` measurements with a `service` tag.

[[inputs.http_response]]
  urls = [
    "http://keycloak:8080/auth/health/live",
    "http://grafana:3000/api/health",
    "http://iot-bridge-api:8000/health",
  ]
  response_timeout = "10s"
  method = "GET"
  [inputs.http_response.tags]
    category = "service-health"

# RabbitMQ health-check needs Basic Auth and the /rabbitmq path prefix
[[inputs.http_response]]
  urls = ["http://rabbitmq:15672/rabbitmq/api/healthchecks/node"]
  response_timeout = "10s"
  method = "GET"
  username = "$RABBITMQ_ADMIN_USER"
  password = "$RABBITMQ_ADMIN_PASS"
  [inputs.http_response.tags]
    category = "service-health"

[[inputs.http_response]]
  urls = ["https://step-ca:9000/health"]
  response_timeout = "10s"
  method = "GET"
  tls_ca = "/etc/ssl/certs/ca-certificates.crt"
  insecure_skip_verify = true
  [inputs.http_response.tags]
    category = "service-health"

# ── RabbitMQ management metrics ───────────────────────────────────────────────
# Native RabbitMQ plugin metrics (queue depths, message rates, connection counts).
# management.path_prefix = /rabbitmq applies on port 15672 too
[[inputs.rabbitmq]]
  url      = "http://rabbitmq:15672/rabbitmq"
  username = "$RABBITMQ_ADMIN_USER"
  password = "$RABBITMQ_ADMIN_PASS"
  # Note: 404 errors for /api/federation-links are expected – the
  # rabbitmq_federation plugin is not enabled. They are non-fatal.

# ── MQTT telemetry from cdm-metrics vHost (mTLS) ─────────────────────────────
# Subscribes to all provider telemetry topics on the cdm-metrics vHost.
# Authentication uses mTLS (EXTERNAL mechanism): the client certificate CN
# "telegraf" maps directly to the RabbitMQ user "telegraf" – no password.
# Certs are provisioned by the mqtt-certs-init service at stack start.
[[inputs.mqtt_consumer]]
  servers   = ["tls://rabbitmq:8883"]
  topics    = ["cdm/provider/#"]
  qos       = 1
  # Must match the SAN in /etc/telegraf/tls/telegraf.crt (issued by step-ca with CN=telegraf)
  client_id = "telegraf"

  # mTLS client certificate (issued by Provider step-ca, CN=telegraf)
  tls_ca   = "/etc/telegraf/tls/ca.crt"
  tls_cert = "/etc/telegraf/tls/telegraf.crt"
  tls_key  = "/etc/telegraf/tls/telegraf.key"

  data_format = "json"
  # System-monitor metrics land in the provider_system table
  name_override = "provider_system"
  # Retry instead of crashing when the broker is not yet ready
  startup_error_behavior = "retry"
