<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDM – User × Role Matrix</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="/css/access-roles.css" />
</head>
<body>

  <!-- ── Hero ───────────────────────────────────────────────── -->
  <div class="hero">
    <div class="container d-flex align-items-center justify-content-between gap-3 flex-wrap">
      <div class="d-flex align-items-center gap-3">
        <span style="font-size:2.2rem">&#x1F465;</span>
        <div>
          <h1 class="mb-0">User &times; Role Matrix</h1>
          <p class="mt-1 mb-0" style="color:#8b949e;font-size:0.88rem">
            Keycloak accounts and their assigned roles &mdash;
            <span class="realm-tag realm-cdm">CDM</span> realm
          </p>
        </div>
      </div>
      <a href="/" class="btn btn-outline-secondary btn-back">&larr; Dashboard</a>
    </div>
  </div>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <div class="container py-4">

    <!-- ── Realm session bar ───────────────────────────────── -->
    <div id="session-bar" class="d-flex flex-wrap gap-3 mb-4">
      <!-- filled dynamically for each realm -->
    </div>

    <!-- ── Legend ──────────────────────────────────────────── -->
    <div id="legend" class="d-none d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <div class="legend-row">
        <span><span style="color:#3fb950;font-size:1.1rem">&#x2714;</span> Role assigned</span>
        <span><span style="color:#484f58">&middot;</span> Not assigned</span>
        <span><span class="role-chip chip-app">APP</span> Application roles</span>
        <span><span class="role-chip chip-prov">PROV</span> Ops/platform roles</span>
        <span><span class="role-chip chip-sys">SYS</span> Keycloak built-in</span>
      </div>
      <span id="last-refresh" style="font-size:0.75rem;color:#484f58"></span>
    </div>

    <!-- ── Matrix output ───────────────────────────────────── -->
    <div id="matrix-container"></div>

  </div>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="border-top mt-5 py-3"
          style="border-color:#21262d!important;font-size:0.78rem;color:#484f58">
    <div class="container d-flex justify-content-between flex-wrap gap-2">
      <span>CDM Provider Stack &mdash; User &times; Role Matrix</span>
      <span>Requires the <code>matrix-viewer</code> realm role in each realm.</span>
    </div>
  </footer>

  <script type="module">
    import Keycloak from '/js/keycloak.js';

    // ──────────────────────────────────────────────────────────
    // Constants
    // ──────────────────────────────────────────────────────────
    const REALMS = ['cdm'];

    const SKIP_ROLES = new Set([
      'uma_authorization', 'offline_access', 'create-realm',
    ]);

    const SYS_PREFIXES = [
      'default-roles-', 'manage-', 'view-', 'query-',
      'create-', 'impersonation', 'realm-admin',
    ];

    // ──────────────────────────────────────────────────────────
    // Keycloak helpers
    // ──────────────────────────────────────────────────────────
    function makeKC(realm) {
      return new Keycloak({ url: '/auth', realm, clientId: 'dashboard' });
    }

    async function trySilentSSO(realm) {
      try {
        const kc   = makeKC(realm);
        const auth = await kc.init({
          onLoad: 'check-sso',
          silentCheckSsoRedirectUri: window.location.origin + '/silent-check-sso.html',
          pkceMethod: 'S256',
          checkLoginIframe: false,
        });
        return auth ? kc : null;
      } catch {
        return null;
      }
    }

    function hasMatrixViewerRole(kc) {
      const t = kc.tokenParsed;
      // Check realm roles array (realm_access.roles or custom "roles" claim)
      const roles = t?.realm_access?.roles ?? t?.roles ?? [];
      // Also accept realm-admin (superadmin) directly
      return roles.includes('matrix-viewer') || roles.includes('realm-admin');
    }

    // ──────────────────────────────────────────────────────────
    // Admin REST helpers
    // ──────────────────────────────────────────────────────────
    async function kcGet(path, token) {
      const r = await fetch(`/auth${path}`, {
        headers: { 'Authorization': `Bearer ${token}` },
        cache: 'no-store',
      });
      if (!r.ok) throw new Error(`HTTP ${r.status} \u2014 ${path}`);
      return r.json();
    }

    async function fetchRoles(realm, token) {
      const roles = await kcGet(`/admin/realms/${realm}/roles`, token);
      return roles
        .filter(r => !SKIP_ROLES.has(r.name))
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    async function fetchUsers(realm, token) {
      const users = await kcGet(`/admin/realms/${realm}/users?max=500`, token);
      const enriched = await Promise.all(users.map(async u => {
        let realmRoles = [];
        try {
          const rm = await kcGet(
            `/admin/realms/${realm}/users/${u.id}/role-mappings/realm`,
            token
          );
          realmRoles = rm.map(r => r.name);
        } catch {/* tolerate per-user failure */}
        return { ...u, realmRoles };
      }));
      return enriched.sort((a, b) => (a.username ?? '').localeCompare(b.username ?? ''));
    }

    // ──────────────────────────────────────────────────────────
    // Render helpers
    // ──────────────────────────────────────────────────────────
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function roleClass(name) {
      if (SYS_PREFIXES.some(p => name.startsWith(p))) return 'chip-sys';
      if (['platform-admin','platform-operator'].includes(name)) return 'chip-prov';
      return 'chip-app';
    }

    function buildMatrix(realm, roles, users) {
      const realmLabel = realm === 'provider' ? 'PROV' : 'CDM';
      const realmCls   = realm === 'provider' ? 'realm-prov' : 'realm-cdm';

      let thead = `<thead><tr>
        <th class="col-user ps-3" style="vertical-align:bottom;padding-bottom:0.75rem">
          <span class="realm-tag ${realmCls}">${realmLabel}</span>
          <span style="font-size:0.72rem;font-weight:600;color:#8b949e;margin-left:0.5rem">User</span>
        </th>`;
      for (const role of roles) {
        const cls = roleClass(role.name);
        thead += `<th class="col-role" title="${esc(role.name)}">
          <div><span class="role-chip ${cls}">${esc(role.name)}</span></div>
        </th>`;
      }
      thead += '</tr></thead>';

      let tbody = '<tbody>';
      for (const user of users) {
        const statusCls = user.enabled ? 'status-active' : 'status-disabled';
        const statusTxt = user.enabled ? 'active' : 'disabled';
        const assigned  = new Set(user.realmRoles);
        tbody += `<tr>
          <td class="col-user">
            <span class="username">${esc(user.username)}</span>
            ${user.email ? `<span class="user-email">${esc(user.email)}</span>` : ''}
            <span class="user-status ${statusCls}">${statusTxt}</span>
          </td>`;
        for (const role of roles) {
          if (assigned.has(role.name)) {
            tbody += `<td class="cell-yes" title="${esc(role.name)} \u2714">\u2714</td>`;
          } else {
            tbody += `<td class="cell-no"  title="${esc(role.name)}">\u00b7</td>`;
          }
        }
        tbody += '</tr>';
      }
      tbody += '</tbody>';

      return `<div class="matrix-wrap mb-4">
        <table class="matrix">${thead}${tbody}</table>
      </div>`;
    }

    // ──────────────────────────────────────────────────────────
    // Session bar rendering
    // ──────────────────────────────────────────────────────────
    function renderSessionBar(sessions) {
      const bar = document.getElementById('session-bar');
      bar.innerHTML = '';

      for (const realm of REALMS) {
        const kc = sessions[realm];
        const realmCls = realm === 'provider' ? 'realm-prov' : 'realm-cdm';
        const div = document.createElement('div');
        div.style.cssText = 'background:#161b22;border:1px solid #30363d;border-radius:8px;padding:0.6rem 1rem;display:flex;align-items:center;gap:0.75rem;font-size:0.82rem;';

        if (kc) {
          const username = kc.tokenParsed?.preferred_username ?? '?';
          const hasPerm  = hasMatrixViewerRole(kc);
          const permIcon = hasPerm ? '\u2714' : '\u26a0\ufe0f';
          const permTip  = hasPerm ? 'matrix-viewer role present' : 'missing matrix-viewer role \u2014 no data access';
          div.innerHTML = `
            <span class="realm-tag ${realmCls}">${realm.toUpperCase()}</span>
            <span style="color:#56d364">\u25cf</span>
            <span style="color:#c9d1d9">${esc(username)}</span>
            <span title="${permTip}" style="color:${hasPerm ? '#3fb950' : '#d29922'}">${permIcon}</span>
            <button class="btn btn-sm btn-outline-secondary ms-auto" style="font-size:0.72rem;padding:0.15rem 0.5rem"
                    data-logout="${realm}">Logout</button>`;
        } else {
          div.innerHTML = `
            <span class="realm-tag ${realmCls}">${realm.toUpperCase()}</span>
            <span style="color:#484f58">\u25cf</span>
            <span style="color:#484f58">not logged in</span>
            <button class="btn btn-sm btn-primary ms-auto" style="font-size:0.72rem;padding:0.15rem 0.5rem"
                    data-login="${realm}">Login \u2192</button>`;
        }
        bar.appendChild(div);
      }

      // Wire buttons
      bar.querySelectorAll('[data-logout]').forEach(btn =>
        btn.addEventListener('click', () => {
          const kc = sessions[btn.dataset.logout];
          kc?.logout({ redirectUri: window.location.href });
        })
      );
      bar.querySelectorAll('[data-login]').forEach(btn =>
        btn.addEventListener('click', () => {
          const kc = makeKC(btn.dataset.login);
          kc.init({ pkceMethod: 'S256', checkLoginIframe: false })
            .then(() => kc.login({ redirectUri: window.location.href }));
        })
      );
    }

    // ──────────────────────────────────────────────────────────
    // Load matrix for one realm
    // ──────────────────────────────────────────────────────────
    async function loadRealmSection(realm, kc) {
      const container = document.getElementById('matrix-container');
      const realmCls  = realm === 'provider' ? 'realm-prov' : 'realm-cdm';
      const heading   = realm === 'provider' ? '\u{1F3E2} Provider realm' : '\u{1F310} CDM realm';

      // Placeholder while loading
      const placeholder = document.createElement('div');
      placeholder.id = `section-${realm}`;
      placeholder.innerHTML = `<div class="d-flex align-items-baseline gap-2 mb-2 mt-3">
        <span style="font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b949e">${heading}</span>
        <span style="font-size:0.72rem;color:#484f58">\u2026 loading</span>
      </div>`;
      container.appendChild(placeholder);

      try {
        const [roles, users] = await Promise.all([
          fetchRoles(realm, kc.token),
          fetchUsers(realm, kc.token),
        ]);
        placeholder.innerHTML = `
          <div class="d-flex align-items-baseline gap-2 mb-2 mt-3">
            <span style="font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b949e">${heading}</span>
            <span style="font-size:0.72rem;color:#484f58">${users.length} user(s) \u00b7 ${roles.length} role(s)</span>
          </div>
          ${buildMatrix(realm, roles, users)}`;
      } catch (err) {
        placeholder.innerHTML = `
          <div class="d-flex align-items-baseline gap-2 mb-2 mt-3">
            <span style="font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b949e">${heading}</span>
          </div>
          <div class="err-banner mb-4">\u274c ${esc(err.message)}</div>`;
      }
    }

    // ──────────────────────────────────────────────────────────
    // Bootstrap
    // ──────────────────────────────────────────────────────────

    // Silent SSO must run sequentially (Keycloak.js uses a shared iframe)
    const sessions = {};
    for (const realm of REALMS) {
      sessions[realm] = await trySilentSSO(realm);
    }

    renderSessionBar(sessions);

    // Load matrix for each realm that has an authenticated session with permissions
    const loadable = REALMS.filter(r => sessions[r] && hasMatrixViewerRole(sessions[r]));
    if (loadable.length > 0) {
      document.getElementById('legend').classList.remove('d-none');
      await Promise.all(loadable.map(r => loadRealmSection(r, sessions[r])));
      document.getElementById('last-refresh').textContent =
        'Updated ' + new Date().toLocaleTimeString('de-DE');
    }

    // Show "no permission" notes for realms that are logged in but lack the role
    for (const realm of REALMS) {
      if (sessions[realm] && !hasMatrixViewerRole(sessions[realm])) {
        const container = document.getElementById('matrix-container');
        const realmCls  = realm === 'provider' ? 'realm-prov' : 'realm-cdm';
        container.insertAdjacentHTML('beforeend', `
          <div class="err-banner mb-3" style="border-color:#d29922;background:#2a1f00;color:#d29922">
            \u26a0\ufe0f <span class="realm-tag ${realmCls}">${realm.toUpperCase()}</span>
            &nbsp;Logged in, but the <code>matrix-viewer</code> role is not assigned to this account.
          </div>`);
      }
    }

  </script>

</body>
</html>
