apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy
    url: thingsboard-db:5432
    database: ${TSDB_DATABASE}
    user: grafana
    secureJsonData:
      password: ${TSDB_GRAFANA_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1700
      timescaledb: true
    isDefault: true
    editable: false

